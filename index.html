.card.cinza { border-left-color: #9ca3af; }

.card-title { font-size: 15px; font-weight: 600; color: #1a365d; flex: 1; }
.card-valor { font-size: 15px; font-weight: 700; color: #333; white-space: nowrap; }

.card-info {

.card-info span { display: flex; gap: 4px; }
.card-info .lbl { font-weight: 600; color: #444; }

.barra-fill { height: 100%; border-radius: 11px; transition: width 0.5s; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; }
.barra-fill span { font-size: 11px; font-weight: 700; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
.barra-fisico { background: linear-gradient(90deg, #2563eb, #3b82f6); }
.barra-temporal { background: linear-gradient(90deg, #6b7280, #9ca3af); }

.status-badge.verde { background: #dcfce7; color: #16a34a; }
.status-badge.cinza { background: #f3f4f6; color: #6b7280; }

.card.aberto .card-detalhe { display: block; }

.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; background: #e0e7ff; color: #3730a3; font-size: 11px; margin: 2px; }

@media (max-width: 768px) {

function formatarMoeda(v) {
    if (!v) return 'R$ 0,00';
    return 'R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatarPct(v) {
    if (v === null || v === undefined) return '-';
    return (v * 100).toFixed(1) + '%';
}

function formatarData(d) {
    if (!d) return '-';
    const partes = d.split('-');
    if (partes.length === 3) return partes[2] + '/' + partes[1] + '/' + partes[0];
    return d;
}

function statusTexto(c) {
    if (c.avanco_temporal === null) return 'Sem dados de prazo';
    const fisico = (c.avanco_fisico * 100).toFixed(1);
    const temporal = (c.avanco_temporal * 100).toFixed(1);
    if (c.semaforo === 'verde') return 'No prazo (' + fisico + '% executado / ' + temporal + '% do prazo)';
    if (c.semaforo === 'amarelo') return 'Atenção - deveria estar com ' + temporal + '% de avanço';
    return 'Atrasada - deveria estar com ' + temporal + '% de avanço';
}

function renderCard(c, idx) {
    const tags = c.tags ? c.tags.split(', ').map(t => '<span class="tag">' + t + '</span>').join('') : '';

    return `
    <div class="card ${c.semaforo}" onclick="this.classList.toggle('aberto')" id="card-${idx}">
        <div class="card-header">
            <div>
                <div class="card-title">${c.nome || c.objeto}</div>
                <span class="status-badge ${c.semaforo}">${statusTexto(c)}</span>
            </div>
            <div class="card-valor">${formatarMoeda(c.valor)}</div>
        </div>

        <div class="barras">
            <div class="barra-container">
                <div class="barra-label">Fisico</div>
                <div class="barra-track">
                    <div class="barra-fill barra-fisico" style="width: ${Math.max(c.avanco_fisico * 100, 2)}%">
                        <span>${(c.avanco_fisico * 100).toFixed(1)}%</span>
                    </div>
                </div>
            </div>
            <div class="barra-container">
                <div class="barra-label">Temporal</div>
                <div class="barra-track">
                    <div class="barra-fill barra-temporal" style="width: ${c.avanco_temporal !== null ? Math.max(c.avanco_temporal * 100, 2) : 0}%">
                        <span>${c.avanco_temporal !== null ? (c.avanco_temporal * 100).toFixed(1) + '%' : '-'}</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-info">
            <span><span class="lbl">Empresa:</span> ${c.empresa}</span>
            <span><span class="lbl">Fiscal:</span> ${c.fiscal}</span>
            <span><span class="lbl">OS:</span> ${formatarData(c.os_data)}</span>
            <span><span class="lbl">Prazo exec.:</span> ${c.prazo_exec}</span>
            <span><span class="lbl">Termino exec.:</span> ${formatarData(c.prazo_termino)}</span>
            <span><span class="lbl">Pagamento:</span> ${c.pagamento}</span>
        </div>

        <div class="card-detalhe">
            <div class="card-info">
                <span><span class="lbl">Objeto:</span> ${c.objeto}</span>
                <span><span class="lbl">Gestor:</span> ${c.gestor}</span>
                <span><span class="lbl">Diretoria:</span> ${c.diretoria}</span>
                <span><span class="lbl">Secretaria:</span> ${c.secretaria}</span>
                <span><span class="lbl">Prazo contratual:</span> ${c.prazo_contratual}</span>
                <span><span class="lbl">Debito:</span> ${c.debito ? formatarMoeda(c.debito) : 'Nenhum'}</span>
            </div>
            <div style="margin-top: 8px;">${tags}</div>
        </div>
    </div>`;
}

function filtrar() {
    const busca = document.getElementById('busca').value.toLowerCase();
    const status = document.getElementById('filtroStatus').value;
    const container = document.getElementById('cards');

    const filtrados = contratos.filter(c => {
        const texto = (c.nome + ' ' + c.empresa + ' ' + c.fiscal + ' ' + c.objeto).toLowerCase();
        const matchBusca = !busca || texto.includes(busca);
        const matchStatus = !status || c.semaforo === status;
        return matchBusca && matchStatus;
    });

    container.innerHTML = filtrados.map((c, i) => renderCard(c, i)).join('');
}

// Render inicial
filtrar();
